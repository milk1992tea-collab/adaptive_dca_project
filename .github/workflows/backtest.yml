on:
  push:
    branches:
      - main
  workflow_dispatch: {}
name: Backtest and Publish

permissions:
  contents: write
  pages: write
concurrency:
  group: backtest-${{ github.ref }}
  cancel-in-progress: false

jobs:
  backtest:
    runs-on: ubuntu-latest
    outputs:
      artifact_sha: ${{ steps.set_artifact_sha.outputs.artifact_sha }}
      commit_sha: ${{ steps.set_commit.outputs.commit_sha }}
      run_id: ${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Produce artifact
        id: produce
        run: |
          mkdir -p out
          # replace with real backtest generation commands
          echo "<html>backtest result $(date -u)</html>" > out/backtest-latest.html
          convert -size 320x120 xc:white out/backtest-latest.png 2>/dev/null || true

      - name: Compute artifact SHA and expose as output
        id: set_artifact_sha
        run: |
          set -euo pipefail
          sha=$(sha256sum out/backtest-latest.html | cut -d" " -f1)
          echo "artifact_sha=$sha" >> $GITHUB_OUTPUT
          echo "$sha" > out/artifact.sha256
        shell: bash

      - name: Set backtest job output commit
        id: set_commit
        run: |
          echo "commit_sha=${GITHUB_SHA:0:8}" >> $GITHUB_OUTPUT

      - name: Upload backtest artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backtest-out-${{ steps.set_commit.outputs.commit_sha }}
          path: out

  publish:
    needs: backtest
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download backtest artifacts
        uses: actions/download-artifact@v4
        with:
          name: backtest-out-${{ needs.backtest.outputs.commit_sha }}
          path: downloaded_out

      - name: Verify artifact SHA matches backtest job output
        id: verify_sha
        run: |
          set -euo pipefail
          file=$(find downloaded_out -type f -name "backtest-latest.html" -print -quit)
          if [ -z "${file:-}" ]; then
            echo "Downloaded artifact missing backtest-latest.html" >&2
            exit 1
          fi
          downloaded_sha=$(sha256sum "$file" | cut -d" " -f1)
          expected_sha="${{ needs.backtest.outputs.artifact_sha }}"
          echo "downloaded_sha=$downloaded_sha"
          echo "expected_sha=$expected_sha"
          if [ "$downloaded_sha" != "$expected_sha" ]; then
            echo "Artifact mismatch: downloaded SHA does not equal backtest job output SHA" >&2
            exit 1
          fi
        shell: bash

      - name: Publish backtest artifacts to gh-pages and update index
        if: always()
        env:
          PUBLISH_BRANCH: gh-pages
          TARGET_DIR: backtests/${{ needs.backtest.outputs.commit_sha }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin "$PUBLISH_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$PUBLISH_BRANCH:$PUBLISH_BRANCH"
          else
            git checkout --orphan "$PUBLISH_BRANCH"
            git rm -rf .
            git commit --allow-empty -m "init $PUBLISH_BRANCH"
            git push origin "$PUBLISH_BRANCH"
            git checkout -f "$GITHUB_REF" || true
          fi

          TMPDIR=$(mktemp -d)
          git worktree add "$TMPDIR" "$PUBLISH_BRANCH"

          # Replace target dir so git will detect changes
          rm -rf "$TMPDIR/$TARGET_DIR" || true
          mkdir -p "$TMPDIR/$TARGET_DIR"
          cp -av downloaded_out/. "$TMPDIR/$TARGET_DIR/" 2>/dev/null || true

          # Prepare index update variables
          cd "$TMPDIR"
          git fetch origin "$PUBLISH_BRANCH" || true
          git reset --mixed "origin/$PUBLISH_BRANCH" || true

          artifact_file="$TARGET_DIR/artifact.sha256"
          if [ -f "$artifact_file" ]; then
            artifact_sha=$(cat "$artifact_file" | tr -d " \n")
          else
            artifact_sha=""
          fi
          commit_short="${GITHUB_SHA:0:8}"
          run_id="${RUN_ID}"
          ts=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          index_path="index.json"

          # Read existing index or create empty
          if [ -f "$index_path" ]; then
            # safe parse to avoid jq absence by using python fallback
            if command -v jq >/dev/null 2>&1; then
              existing=$(jq -c '.' "$index_path")
            else
              existing=$(python3 -c "import json,sys;print(json.dumps(json.load(open('$index_path'))))" 2>/dev/null || echo "[]")
            fi
          else
            existing="[]"
          fi

          # Build new entry
          new_entry=$(printf '{"path":"%s","sha":"%s","commit":"%s","run":%s,"ts":"%s"}' "$TARGET_DIR" "$artifact_sha" "$commit_short" "$run_id" "$ts")

          # Merge: remove any existing same path, append new
          if command -v jq >/dev/null 2>&1; then
            tmp=$(mktemp)
            echo "$existing" | jq --argjson ne "$new_entry" --arg path "$TARGET_DIR" 'map(select(.path != $path)) + [$ne]' > "$tmp"
            mv "$tmp" "$index_path"
          else
            # Python merge fallback
            python3 - <<PY
import json,sys,os
idx_file = "$index_path"
try:
    idx = json.load(open(idx_file))
except Exception:
    idx = []
# filter out same path
idx = [e for e in idx if e.get("path") != "$TARGET_DIR"]
# append new
idx.append($new_entry)
open(idx_file,"w").write(json.dumps(idx,indent=2))
PY
          fi

          # Stage changes and commit only if there are staged differences
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "ci: publish backtest artifacts for $GITHUB_SHA"
            git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}" "$PUBLISH_BRANCH"
            echo "Published artifacts to $PUBLISH_BRANCH/$TARGET_DIR and updated index.json"
          else
            echo "No artifact changes to publish"
          fi

          cd - >/dev/null || true
          git worktree remove "$TMPDIR" --force || true
          rm -rf "$TMPDIR"
        shell: bash





