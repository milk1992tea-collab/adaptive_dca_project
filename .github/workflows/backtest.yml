name: Backtest and Artifacts

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backtest and produce plot
        run: |
          # 修改為你的回測指令，確保輸出 bt_plot.html 到工作目錄
          python run_backtest.py --output bt_plot.html

      - name: Set commit and ts
        run: |
          echo "COMMIT=$(git rev-parse --short=8 HEAD)" >> $GITHUB_ENV
          echo "TS=$(date -u +%Y%m%d%H%M)" >> $GITHUB_ENV

      - name: Rename plot with commit and ts
        run: |
          if [ -f bt_plot.html ]; then
            mv bt_plot.html backtest-${{ env.COMMIT }}-${{ env.TS }}.html
          else
            echo "bt_plot.html not found" >&2
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backtest-plot-${{ env.COMMIT }}-${{ env.TS }}
          path: backtest-${{ env.COMMIT }}-${{ env.TS }}.html
