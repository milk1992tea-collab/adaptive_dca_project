name: Backtest and Artifacts

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary -r requirements.txt

      - name: Run backtest and produce plot
        run: |
          # 優先執行實際腳本；若不存在則退出失敗避免上傳測試檔
          if [ -f "./run_backtest.py" ]; then
            python ./run_backtest.py --output bt_plot.html
          elif [ -f "./tools/run_backtest.py" ]; then
            python ./tools/run_backtest.py --output bt_plot.html
          else
            echo "ERROR: run_backtest.py not found in expected locations" >&2
            echo "Searched: ./run_backtest.py and ./tools/run_backtest.py" >&2
            exit 1
          fi

          if [ -f bt_plot.html ]; then
            echo "bt_plot.html ready, size:"
            stat -c "%s bytes" bt_plot.html || ls -la bt_plot.html
          else
            echo "ERROR: bt_plot.html missing after running backtest" >&2
            exit 2
          fi

      - name: Set commit and ts
        run: |
          echo "COMMIT=$(git rev-parse --short=8 HEAD)" >> $GITHUB_ENV
          echo "TS=$(date -u +%Y%m%d%H%M)" >> $GITHUB_ENV

      - name: Rename plot with commit and ts
        run: |
          mv bt_plot.html backtest-${{ env.COMMIT }}-${{ env.TS }}.html

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backtest-plot-${{ env.COMMIT }}-${{ env.TS }}
          path: backtest-${{ env.COMMIT }}-${{ env.TS }}.html

