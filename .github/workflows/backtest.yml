name: Backtest and Publish

permissions:
  contents: write
  pages: write

on:
  push:
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.set_commit.outputs.commit_sha }}
    steps:
      - uses: actions/checkout@v4
      - name: produce artifact (replace with real backtest)
        run: |
          mkdir -p out
          # replace the following with your real backtest commands that produce files in out/
          echo "<html>backtest result</html>" > out/backtest-latest.html
          convert -size 320x120 xc:white out/backtest-latest.png 2>/dev/null || true
      - name: Set backtest job output commit
        id: set_commit
        run: |
          # write short SHA (first 8 chars) to job output
          echo "commit_sha=${GITHUB_SHA:0:8}" >> $GITHUB_OUTPUT

  publish:
    needs: backtest
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Publish backtest artifacts to gh-pages
        if: always()
        env:
          PUBLISH_BRANCH: gh-pages
          TARGET_DIR: backtests/${{ needs.backtest.outputs.commit_sha }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Ensure remote branch exists or initialize it
          if git ls-remote --exit-code --heads origin "$PUBLISH_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$PUBLISH_BRANCH:$PUBLISH_BRANCH"
          else
            git checkout --orphan "$PUBLISH_BRANCH"
            git rm -rf .
            git commit --allow-empty -m "init $PUBLISH_BRANCH"
            git push origin "$PUBLISH_BRANCH"
            git checkout -f "$GITHUB_REF" || true
          fi

          TMPDIR=$(mktemp -d)
          git worktree add "$TMPDIR" "$PUBLISH_BRANCH"

          mkdir -p "$TMPDIR/$TARGET_DIR"
          cp -v out/backtest-latest.html "$TMPDIR/$TARGET_DIR/" 2>/dev/null || true
          cp -v out/backtest-latest.png  "$TMPDIR/$TARGET_DIR/" 2>/dev/null || true
          cp -v out/backtest-*.html "$TMPDIR/$TARGET_DIR/" 2>/dev/null || true
          cp -v out/backtest-*.png  "$TMPDIR/$TARGET_DIR/" 2>/dev/null || true
          cp -v out/debug-*.txt      "$TMPDIR/$TARGET_DIR/" 2>/dev/null || true

          pushd "$TMPDIR" >/dev/null
          git fetch origin "$PUBLISH_BRANCH" || true
          git reset --mixed "origin/$PUBLISH_BRANCH" || true

          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "ci: publish backtest artifacts for $GITHUB_SHA"
            git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}" "$PUBLISH_BRANCH"
            echo "Published artifacts to $PUBLISH_BRANCH/$TARGET_DIR"
          else
            echo "No artifact changes to publish"
          fi
          popd >/dev/null
          git worktree remove "$TMPDIR" --force || true
          rm -rf "$TMPDIR"
