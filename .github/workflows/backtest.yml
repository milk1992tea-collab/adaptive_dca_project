name: Backtest and Artifacts

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true

      - name: Run backtest and produce plot
        run: |
          # 嘗試以預期位置執行回測腳本
          if [ -f "./run_backtest.py" ]; then
            python ./run_backtest.py --output bt_plot.html || python ./run_backtest.py
          elif [ -f "./tools/run_backtest.py" ]; then
            python ./tools/run_backtest.py --output bt_plot.html || python ./tools/run_backtest.py
          else
            echo "run_backtest.py not found; listing files for debugging:"
            ls -la
            find . -maxdepth 4 -type f -name "run_backtest.py" -print || true
            # 建立 smoke-test bt_plot.html 以驗證 artifact 流程
            echo "<html><body><h1>Backtest smoke test</h1></body></html>" > bt_plot.html
            echo "Created smoke-test bt_plot.html"
          fi

          if [ -f bt_plot.html ]; then
            echo "bt_plot.html ready, size:"
            stat -c "%s bytes" bt_plot.html || ls -la bt_plot.html
          else
            echo "ERROR: bt_plot.html missing" >&2
            exit 2
          fi

      - name: Set commit and ts
        run: |
          echo "COMMIT=$(git rev-parse --short=8 HEAD)" >> $GITHUB_ENV
          echo "TS=$(date -u +%Y%m%d%H%M)" >> $GITHUB_ENV

      - name: Rename plot with commit and ts
        run: |
          if [ -f bt_plot.html ]; then
            mv bt_plot.html backtest-${{ env.COMMIT }}-${{ env.TS }}.html
          else
            echo "bt_plot.html not found" >&2
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backtest-plot-${{ env.COMMIT }}-${{ env.TS }}
          path: backtest-${{ env.COMMIT }}-${{ env.TS }}.html
